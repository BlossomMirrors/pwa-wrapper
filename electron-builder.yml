appId: org.blossomos.webapps
productName: blossomos-webapps
executableName: blossomos-webapps
electronDist: node_modules/electron/dist

directories:
  output: dist
  buildResources: build

extraResources:
  - from: src/wayland-appid-proxy
    to: wayland-appid-proxy

files:
  - src/**/*
  - "!src/wayland-appid-proxy"
  - "!src/wayland-appid-proxy.c"
  - "!src/wmclass-preload.so"
  - "!src/wmclass-preload.c"
  - "!src/wmclass-preload-asm.S"
  - package.json

linux:
  target:
    - target: rpm
      arch: x64
  category: Network
  executableName: blossomos-webapps
  desktop:
    entry:
      Name: Web App Support
      Comment: Web App Support for Blossomos
      NoDisplay: true

rpm:
  packageName: blossomos-webapps
  synopsis: Web App Support for Blossomos
  depends:
    - unzip
    - curl

artifactName: "${productName}-${version}-${arch}.${ext}"
