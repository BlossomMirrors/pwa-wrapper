appId: org.blossomos.webapps
productName: blossomos-webapps
executableName: blossomos-webapps
electronDist: node_modules/electron/dist

directories:
  output: dist
  buildResources: build

files:
  - src/**/*
  - package.json

linux:
  target:
    - target: rpm
      arch: x64
  category: Network
  executableName: blossomos-webapps
  desktop:
    entry:
      Name: Web App Support
      Comment: Web App Support for Blossomos
      NoDisplay: true

rpm:
  packageName: blossomos-webapps
  synopsis: Web App Support for Blossomos
  depends:
    - unzip
    - curl

artifactName: "${productName}-${version}-${arch}.${ext}"
